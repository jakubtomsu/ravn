name: CI
on:
  push:
    paths-ignore:
      - '**/*.md'
  pull_request:
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

jobs:
  build_windows:
    name: Windows Build and Check
    runs-on: windows-2022
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Odin
        shell: cmd
        run: |
          git clone https://github.com/odin-lang/Odin.git --depth 1 --single-branch --branch=master
          cd Odin
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          ./build.bat
          ./odin version
          ./odin report

      - name: Check All
        shell: cmd
        run: |
          set "ODIN_PATH=%CD%\Odin"
          call check_all.cmd
